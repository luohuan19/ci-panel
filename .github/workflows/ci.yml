name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build all packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: |
            package-lock.json
            common/package-lock.json
            panel/package-lock.json
            daemon/package-lock.json
            frontend/package-lock.json

      # The four packages are NOT an npm workspace. Installing at the root is
      # what covers everything: it pulls the root dependencies (panel imports
      # async-mutex, which is declared only here) and its `install` lifecycle
      # script then runs install-dependents plus preview-build, which installs
      # daemon/panel/frontend and builds common.
      - name: Install dependencies
        run: npm install

      - name: Build panel
        run: npm run build --prefix panel

      - name: Build daemon
        run: npm run build --prefix daemon

      # This is `run-p type-check build-only`, so vue-tsc runs here too.
      # panel and daemon have no type-check script; their type errors surface
      # through their webpack builds above.
      - name: Build frontend
        run: npm run build --prefix frontend
