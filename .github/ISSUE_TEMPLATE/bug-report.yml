name: Bug Report
description: Report a problem in ci-panel
title: "[Bug] "
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of ci-panel is affected?
      options:
        - Panel (web backend / API)
        - Daemon (node agent)
        - Frontend (web UI)
        - Runner provisioning / registration
        - Not sure
    validations:
      required: true
  - type: input
    id: commit
    attributes:
      label: Commit
      description: Output of `git rev-parse --short HEAD`. ci-panel is not versioned by release, so the commit is the identifier.
      placeholder: e.g. 53fb1ea
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS and architecture of the affected host.
      placeholder: e.g. Ubuntu 22.04 aarch64
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node version
      description: Output of `node --version`.
      placeholder: e.g. v20.11.0
    validations:
      required: true
  - type: textarea
    id: bug-description
    attributes:
      label: What happened
      description: Describe the actual behaviour, the expected behaviour, and the exact steps to reproduce it.
      placeholder: |
        Actual: ...
        Expected: ...

        Steps to reproduce:
        1. ...
        2. ...
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: Relevant output from the panel, daemon, or browser console. Redact tokens, internal hostnames, and IPs before pasting — this repository is public.
      render: shell
    validations:
      required: false
